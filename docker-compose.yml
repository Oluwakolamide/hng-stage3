version: "3.8"

# ────────────────────────────────────────────────────────────────────────── #
#  Named volumes                                                              #
# ────────────────────────────────────────────────────────────────────────── #
volumes:
  HNG-nginx-logs:    # Nginx writes here; detector mounts read-only
  nextcloud-data:
  nextcloud-db:

# ────────────────────────────────────────────────────────────────────────── #
#  Services                                                                   #
# ────────────────────────────────────────────────────────────────────────── #
services:

  # ── MariaDB ─────────────────────────────────────────────────────────── #
  db:
    image: mariadb:10.6
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-nextcloud_root_pass}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-nextcloud}
      MYSQL_USER:          ${MYSQL_USER:-nextcloud}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-nextcloud_pass}
    volumes:
      - nextcloud-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nextcloud ────────────────────────────────────────────────────────── #
  nextcloud:
    image: kefaslungu/hng-nextcloud
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_HOST:               db
      MYSQL_DATABASE:           ${MYSQL_DATABASE:-nextcloud}
      MYSQL_USER:               ${MYSQL_USER:-nextcloud}
      MYSQL_PASSWORD:           ${MYSQL_PASSWORD:-nextcloud_pass}
      NEXTCLOUD_ADMIN_USER:     ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:-changeme123}
      NEXTCLOUD_TRUSTED_DOMAINS: ${SERVER_IP:-localhost}
    volumes:
      - nextcloud-data:/var/www/html
      # Nextcloud can read nginx logs (optional, for completeness per spec)
      - HNG-nginx-logs:/var/log/nginx:ro

  # ── Nginx reverse proxy ──────────────────────────────────────────────── #
  nginx:
    image: nginx:1.25-alpine
    restart: always
    depends_on:
      - nextcloud
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Nginx WRITES to this volume
      - HNG-nginx-logs:/var/log/nginx

  # ── Anomaly Detection Daemon ─────────────────────────────────────────── #
  detector:
    build: ./detector
    restart: always
    depends_on:
      - nginx
    # Host networking is required so that iptables rules applied inside
    # the container affect the actual host INPUT chain, blocking traffic
    # before it reaches Nginx. NET_ADMIN capability grants iptables access.
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # privileged: true  # Uncomment if NET_ADMIN alone is insufficient on your distro
    volumes:
      # Detector READS nginx logs (read-only mount)
      - HNG-nginx-logs:/var/log/nginx:ro
      # Persist audit log on the host
      - /var/log/detector:/var/log/detector
    environment:
      - PYTHONUNBUFFERED=1
    # With network_mode: host, ports mapping is ignored.
    # The dashboard is accessible at http://<server-ip>:8080
