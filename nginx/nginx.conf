user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ------------------------------------------------------------------ #
    #  Real client IP extraction                                           #
    # ------------------------------------------------------------------ #
    # Trust all private ranges + loopback as proxy sources.
    # Adjust if your VPS sits behind an external load balancer.
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    set_real_ip_from  127.0.0.1;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # Map that resolves the actual client IP for use in logs:
    # If X-Forwarded-For is present, use its first (leftmost) value.
    # Otherwise fall back to $remote_addr.
    map $http_x_forwarded_for $source_ip {
        ""       $remote_addr;
        ~^([^,]+) $1;           # Take first IP in the XFF chain
        default  $remote_addr;
    }

    # ------------------------------------------------------------------ #
    #  JSON access log format                                              #
    # Required fields: source_ip, timestamp, method, path,               #
    #                  status, response_size                              #
    # ------------------------------------------------------------------ #
    log_format json_access escape=json
        '{'
            '"source_ip":"$source_ip",'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"response_size":$body_bytes_sent,'
            '"host":"$host",'
            '"user_agent":"$http_user_agent",'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr"'
        '}';

    # Write to the shared volume — detector mounts this read-only
    access_log /var/log/nginx/hng-access.log json_access;

    sendfile        on;
    keepalive_timeout  65;

    # ------------------------------------------------------------------ #
    #  Nextcloud reverse proxy                                             #
    # ------------------------------------------------------------------ #
    server {
        listen 80;
        server_name _;

        # Increase body size for file uploads to Nextcloud
        client_max_body_size 10G;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;

        location / {
            proxy_pass         http://nextcloud:80;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;

            # Required by Nextcloud
            proxy_set_header   X-Forwarded-Host   $host;
            proxy_buffering    off;

            # WebDAV support
            proxy_request_buffering off;
        }
    }
}
